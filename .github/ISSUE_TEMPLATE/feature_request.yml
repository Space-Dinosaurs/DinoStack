name: Feature request
description: Suggest a new capability or enhancement.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Who is affected?
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you'd prefer the proposed one.
    validations:
      required: false
  - type: checkboxes
    id: affected_adapters
    attributes:
      label: Affected adapters
      description: Tick all that apply.
      options:
        - label: Claude Code
        - label: Cursor
        - label: Codex CLI
        - label: Gemini CLI
        - label: Kimi Code
        - label: OpenCode
        - label: Pi coding agent
        - label: Pi oh-my-pi
        - label: Hermes
        - label: None (methodology / docs only)
    validations:
      required: false
