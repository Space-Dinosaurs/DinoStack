name: corpus-validation

on:
  pull_request:
    paths:
      - "evals/skill-comparison/**"
  push:
    branches:
      - main
    paths:
      - "evals/skill-comparison/**"

jobs:
  validate-corpus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Validate corpus.yaml structure
        run: python evals/skill-comparison/tasks/validate_corpus.py

      - name: Run corpus tests
        run: pytest evals/skill-comparison/tests/test_corpus.py -v
