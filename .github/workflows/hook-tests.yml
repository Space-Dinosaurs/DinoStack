name: hook-tests
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  run-hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Run hook tests
        run: |
          for f in hooks/tests/*.js; do
            echo "== $f =="
            node "$f" || exit 1
          done
