id: ag-003
description: "Caching layer for product-catalog reads. Below-ceiling: high coded-bullet floors exercise the coded_bullets axis."
component: adr-generator
protocol_sha: 04d817c093f8b65bac38855733f34ecb001c14b7
inputs:
  decision_brief: |
    Decision title: Read-through caching layer for the product-catalog service.

    Context: The product-catalog service fronts a 12M-row Postgres table
    and serves ~8000 RPS of point-lookups to the storefront and search
    systems. p99 latency at the DB today is 40ms, above our 25ms API
    budget. Writes happen primarily via a nightly import job plus ad-hoc
    merchandiser edits during business hours.

    Decision: Introduce a read-through Redis cluster (ElastiCache) in
    front of the product-catalog service, keyed by `sku` with a 15-minute
    TTL. Invalidate on merchandiser edits via a Redis DEL emitted from
    the write path. Hot keys (top 1% of SKUs) pre-warmed at deploy time.

    Alternatives considered: application-local LRU cache per pod
    (rejected - memory per pod too high, fan-out on DEL impractical),
    CDN-layer caching at the storefront edge (rejected - search system
    cannot benefit, and TTL granularity is too coarse), database-level
    materialized views (rejected - refresh latency unacceptable for
    merchandiser workflow).

    Stakeholders: platform-team (authors), storefront-team (consumers),
    search-team (consumers), merchandiser-tools-team (affected).
  constraints: |
    - Merchandiser edits must be visible within 60 seconds globally.
    - Cache must be cold-start resilient (fall back to DB cleanly).
    - Added operational surface area must fit within existing SRE on-call.
