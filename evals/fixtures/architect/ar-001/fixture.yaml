id: ar-001
description: "Add a new REST endpoint to an existing Express API - baseline ceiling-capable fixture with clean additive scope."
component: architect
protocol_sha: 86b4cd5db464a2edd2fc46171d00743ad72f42b7
inputs:
  task_description: |
    Add a GET /api/v1/tasks/:id/history endpoint that returns the audit-log
    entries for a single task, ordered newest-first, paginated by
    query-string cursor. Response shape should match the existing
    /api/v1/tasks/:id response envelope convention used elsewhere in the
    API. No UI work in this ticket - backend only.
  codebase_context: |
    The service is a TypeScript Express 4.x API under src/api/. Existing
    routes live in src/api/routes/tasks.ts and are registered in
    src/api/router.ts via a plain `router.use("/tasks", tasksRouter)`
    mount. Controllers (src/api/controllers/tasks.ts) call into
    src/domain/tasks/ which in turn queries the Postgres store via
    src/infra/db/tasks.repo.ts using a tiny hand-written query builder
    (no ORM). Every existing list endpoint returns a
    `{ data: T[], next_cursor: string | null }` envelope; single-item
    endpoints return `{ data: T }`. Audit log rows already exist in a
    table `task_audit_events` (fields: id, task_id, event_type, payload
    jsonb, created_at) and are written on every mutation by an existing
    service trigger. There is no read path for them today. Tests use
    supertest + Jest; route tests live alongside routes as
    tasks.test.ts. The repo follows a vertical-slice convention: route,
    controller, domain function, repo function all land in the same PR
    for a new endpoint.
  constraints: |
    - Must preserve the existing envelope convention (list endpoints use
      `{ data, next_cursor }`).
    - Must not introduce an ORM.
    - Query must be index-backed; confirm which index supports it.
expected:
  approach_class: additive_endpoint
  required_api_symbols:
    - "GET /api/v1/tasks/:id/history"
    - "next_cursor"
  required_file_paths:
    - "src/api/routes/tasks.ts"
    - "src/api/controllers/tasks.ts"
    - "src/infra/db/tasks.repo.ts"
  required_keywords_by_section:
    "Codebase context":
      - "envelope"
      - "task_audit_events"
    "Data model":
      - "task_audit_events"
    "Implementation steps":
      - "route"
      - "controller"
      - "repo"
  forbidden_patterns:
    - pattern: "introduce (?:an? )?ORM"
      severity: major
    - pattern: "rewrite.*router"
      severity: minor
  must_commit_single_approach: true
  must_list_alternatives: true
  open_questions_required: none
