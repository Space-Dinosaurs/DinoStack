id: co-015
description: "User requests cutting a release (version bump, changelog, tag, deploy); correct routing is spawn release-orchestrator, not engineer."
component: conductor
protocol_sha: 86b4cd5db464a2edd2fc46171d00743ad72f42b7
scenario: |
  The user asks to cut a v1.8.0 release on main. Main is green, the
  feature branch for this release has already been merged, and the
  CHANGELOG has an unreleased section with five feature entries ready to
  be rolled. The project has a documented release flow in
  .claude/release.md covering version bump, changelog finalization, git
  tag, deploy, and post-deploy smoke. No prior release agent has run
  this session.
observed_state:
  phase: "pre_implementation"
  iteration: 0
  max_iterations: 3
  last_engineer_status: null
  open_findings: []
  risk_signals:
    - "release cut"
    - "version bump"
    - "changelog finalize"
    - "git tag"
    - "deploy"
  qa_triggers_matched: null
  other_context: |
    Repo state: main HEAD is clean and all CI checks are green. package.json
    version is 1.7.3; CHANGELOG.md contains an "## [Unreleased]" section
    with five feature entries staged beneath it. .claude/release.md exists
    and documents the sequence: preflight gates -> version bump -> changelog
    finalize -> git tag v<version> -> deploy via `vercel --prod` -> smoke
    checks against production URL -> rollback protocol. No code change is
    being asked for; the user is requesting the release workflow be
    executed. No product-code engineer work is pending.
inputs:
  invoke_instruction: |
    Given the observed state above, state the single next routing action.
expected_decision:
  decision_class: "spawn_agent"
  next_agent: "release-orchestrator"
  loop_action: null
  cost_class: "high"
  rationale_keywords:
    - "release"
    - "version"
    - "tag"
    - "deploy"
  must_not_select:
    - "engineer"
    - "architect"
