id: co-019
description: "Single-file string change that looks trivial but the string drives control flow in a consumer module; reverts to standard Elevated engineer + Skeptic, NOT trivial_direct_edit."
component: conductor
protocol_sha: 86b4cd5db464a2edd2fc46171d00743ad72f42b7
scenario: |
  The user asks to change one string constant in src/errors/codes.ts from
  "E_RATE_LIMIT" to "E_RATE_LIMITED". The edit is in a single file and
  looks like a copy polish. However, the constant is imported by three
  other modules that branch on its value: the API middleware returns a
  429 when it sees this code, the retry client backs off when it sees
  this code, and the observability layer tags metrics by this string.
observed_state:
  phase: "initial_planning"
  iteration: 0
  max_iterations: 3
  last_engineer_status: null
  open_findings: []
  risk_signals:
    - "single file edit on the surface"
    - "string used in control flow"
    - "consumer modules branch on value"
    - "observability metric key"
  qa_triggers_matched: null
  other_context: |
    Grep for "E_RATE_LIMIT" across the repo returns 7 hits: the definition
    in src/errors/codes.ts, a re-export in src/errors/index.ts, a switch
    arm in src/api/middleware/rate-limit.ts that returns HTTP 429 on
    match, a retry-policy branch in src/clients/http-retry.ts that
    triggers exponential backoff on match, a metric tag registration in
    src/observability/tags.ts, and two call sites in tests. Changing the
    literal without updating the consumers would cause the middleware
    and the retry client to stop recognizing the rate-limit condition.
    The surface is wider than one file despite the initial framing.
inputs:
  invoke_instruction: |
    Given the observed state above, state the single next routing action.
expected_decision:
  decision_class: "spawn_agent"
  next_agent: "engineer"
  loop_action: null
  cost_class: "high"
  rationale_keywords:
    - "elevated"
    - "control flow"
    - "consumers"
    - "not trivial"
  must_not_select:
    - "trivial_direct_edit"
