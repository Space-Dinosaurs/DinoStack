id: db-003
description: "Token bucket intermittently lets more requests through than capacity; decrement sits outside the refill lock."
component: debugger
protocol_sha: 86b4cd5db464a2edd2fc46171d00743ad72f42b7
inputs:
  bug_report: |
    An async token-bucket rate limiter's concurrency test is flaky. A
    burst of 20 concurrent allow() calls against a capacity=10 bucket
    sometimes lets 11-14 requests through instead of exactly 10. The
    test has been rerun 7 times and produced {10, 10, 12, 10, 14, 11,
    10}. The source is in source.py; the failing run output is in
    test_output.txt. Reproduction is not deterministic - the test
    passes on some runs and fails on others.
  source_file: source.py
  test_output_file: test_output.txt
expected_confidence: Medium
root_cause_location_hint: code
diagnosis_keywords:
  - "race"
  - "lock"
fix_brief_must_mention:
  - "lock"
  - "allow"
