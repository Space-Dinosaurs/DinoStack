id: it-002
component: implement-ticket
protocol_sha: 84c9f7300000000000000000000000000000000
description: "Python bugfix small (ceiling); percent calc off-by-one in report.py"
repo_archetype: "python"
inputs:
  repo_dir: repo/
  base_branch: "main"
  home_config:
    agentic-engineering.json: '{"mode":"opt-in","set_at":"2026-04-20"}'
  ticket_description: |
    `report.py` has an off-by-one in `percent(part, whole)`: it returns
    `part / whole` (ratio), not percent. Fix it to return `(part / whole) * 100`.
    Handle whole == 0 by returning 0.0 rather than raising.
  acceptance_criteria:
    - "percent(1, 2) returns 50.0"
    - "percent(3, 0) returns 0.0 (does not raise)"
    - "Module-level signature is unchanged"
expected_outputs:
  branch_prefix: "fix/"
  must_touch_any_of:
    - "report.py"
  commit_message_must_contain:
    - "percent"
  max_loc: 20
  must_not_exist:
    - ".env"
    - "secrets.txt"
  loop_state_required: true
  quality_required: true
