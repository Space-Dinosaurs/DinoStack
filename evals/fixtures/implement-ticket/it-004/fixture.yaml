id: it-004
component: implement-ticket
protocol_sha: 84c9f7300000000000000000000000000000000
description: "Quality-gate fix-path (below-ceiling); strict script rejects unused vars"
repo_archetype: "node-ts"
inputs:
  repo_dir: repo/
  base_branch: "main"
  home_config:
    agentic-engineering.json: '{"mode":"opt-in","set_at":"2026-04-20"}'
  ticket_description: |
    Add a `clamp(n, lo, hi)` helper to `src/util.ts` that returns `n` bounded
    by `[lo, hi]`. Export it. Note: the repo's lint script rejects any file
    that contains an unused local variable named `_tmp` or similar scratch
    names. Keep the implementation clean of scratch variables.
  acceptance_criteria:
    - "clamp(5, 0, 10) returns 5; clamp(-1, 0, 10) returns 0; clamp(11, 0, 10) returns 10"
    - "Export is named clamp in src/util.ts"
    - "The repo's QUALITY_CMD exits 0"
expected_outputs:
  branch_prefix: "feat/"
  must_touch_any_of:
    - "src/util.ts"
  commit_message_must_contain:
    - "clamp"
  max_loc: 40
  must_not_exist:
    - ".env"
    - "secrets.txt"
  loop_state_required: true
  quality_required: true
