id: ip-001
component: init-project
protocol_sha: aa114e6d0a6afd84d33f947e2a4d4b42f4fe949f
description: "Node + Next.js + pnpm + web UI; expects qa.md, no deploy.md, no tracking.md"
repo_archetype: "node-pnpm"
inputs:
  repo_dir: repo/
  home_config:
    agentic-engineering.json: '{"mode":"opt-out","set_at":"2026-04-18"}'
expected_outputs:
  must_exist:
    - AGENTS.md
    - CLAUDE.md
    - .claude/settings.json
    - .claude/settings.local.json
    - .agentic/findings.md
    - .agentic/preferences.json
    - docs/overview/.gitkeep
    - docs/technical/.gitkeep
    - docs/planning/.gitkeep
    - docs/research/.gitkeep
    - .gitignore
  must_exist_conditional:
    web_ui:
      - .agentic/qa.md
    release:
      - .agentic/deploy.md
    tracker:
      - .agentic/tracking.md
  must_not_exist:
    - .agentic/deploy.md
    - .agentic/tracking.md
  agents_md_required_sections:
    - "# "
    - "## Tools"
    - "## Docs"
    - "## Conventions"
  agents_md_max_lines: 45
  gitignore_required_lines:
    - ".claude/settings.local.json"
    - ".agentic/loop-state.json"
  expected_signals:
    - web_ui
