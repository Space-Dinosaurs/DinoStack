description: "Node + Next.js + Linear tracker signal; expects qa.md and tracking.md"
repo_archetype: "node-pnpm-linear"
inputs:
  repo_dir: repo/
  home_config:
    agentic-engineering.json: '{"mode":"opt-out","set_at":"2026-04-18"}'
expected_outputs:
  must_exist:
    - AGENTS.md
    - CLAUDE.md
    - .claude/settings.json
    - .claude/settings.local.json
    - .agentic/findings.md
    - .agentic/preferences.json
    - docs/overview/.gitkeep
    - docs/technical/.gitkeep
    - docs/planning/.gitkeep
    - docs/research/.gitkeep
    - .gitignore
  must_exist_conditional:
    web_ui:
      - .agentic/qa.md
    release:
      - .agentic/deploy.md
    tracker:
      - .agentic/tracking.md
  must_not_exist:
    - .agentic/deploy.md
  agents_md_required_sections:
    - "# "
    - "## Tools"
    - "## Docs"
    - "## Conventions"
  agents_md_max_lines: 45
  gitignore_required_lines:
    - ".claude/settings.local.json"
    - ".agentic/loop-state.json"
  expected_signals:
    - web_ui
    - tracker
