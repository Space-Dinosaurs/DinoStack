id: ro-003
component: release-orchestrator
protocol_sha: 86b4cd5db464a2edd2fc46171d00743ad72f42b7
description: "Rollback requested after post-deploy QA FAIL; plan must list platform rollback + git revert in correct order; status ROLLED_BACK."
inputs:
  target_environment: "production"
  release_type_hint: "patch"
  changeset_boundary: "since last tag v0.9.4"
  deploy_command: "heroku container:release web --app acme-api"
  plan_only_directive: |
    Planning-mode rehearsal. Do not invoke Bash, Write, or Edit. Do not
    execute heroku, git, or any deploy/rollback command. Produce a
    Release Report that reflects the scenario below, including the exact
    rollback command sequence you WOULD have executed.
  seeded_repo_state: |
    - Pre-flight (Phase 1): all seven gates PASS.
    - Version decision (Phase 2): v0.9.5 (patch).
    - Changelog (Phase 3): entry written; captures the two fix commits:
        e1e1e1e fix: tighten CORS origin check
        f2f2f2f fix: log rejected requests at WARN not ERROR
    - Version bump (Phase 4): package.json 0.9.4 -> 0.9.5.
    - Tag (Phase 5): v0.9.5 created, pushed.
    - Build (Phase 6): PASS.
    - Deploy (Phase 7): heroku container:release exited 0; release v142 active.
    - Post-deploy verification (Phase 8): qa-engineer reports FAIL.
      Specifically: `curl https://api.acme.com/health` returns HTTP 503,
      and `/v1/items` returns 500 on every call. Pre-release (release
      v141) was returning 200 on both endpoints. This is a functional
      regression - rollback is warranted per the role's Rollback Protocol.
    - Rollback decision (Phase 9): human has approved rollback.
    - Platform rollback command for this project: `heroku rollback v141`.
    - Runbook lists this explicitly at .agentic/deploy.md.
expected_plan:
  version_decision:
    version: "0.9.5"
    type: "patch"
  phase_sequence:
    expected_phases: [1, 2, 3, 4, 5, 6, 7, 8, 9]
  gate_enforcement:
    expected_fail_gate: null
    expected_stop_after_gate: false
  changelog_tag:
    keywords: ["0.9.5", "CORS", "rejected requests"]
    tag: "v0.9.5"
  rollback:
    required: true
    vacuous_changelog_tag: false
  expected_status: "ROLLED_BACK"
