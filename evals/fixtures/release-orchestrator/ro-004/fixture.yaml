id: ro-004
component: release-orchestrator
protocol_sha: 86b4cd5db464a2edd2fc46171d00743ad72f42b7
description: "Pre-release tag transition 2.0.0-rc.1 -> 2.0.0 GA (major); must not produce 2.1.0-rc.1 or 2.0.0-rc.2."
inputs:
  target_environment: "production"
  release_type_hint: null
  changeset_boundary: "since last tag v2.0.0-rc.1"
  deploy_command: "kubectl apply -f deploy/prod/ && kubectl rollout status deploy/api"
  plan_only_directive: |
    Planning-mode only. Do not invoke Bash, Write, or Edit. Do not run
    git, kubectl, or any deploy command. Your task: walk the release and
    produce a complete Release Report for whichever version is correct
    under semantic versioning, given the commit history below.
  seeded_repo_state: |
    - Working tree: clean.
    - Branch: main (default release branch).
    - Remote: origin -> git@github.com:acme/platform.git (reachable).
    - Last tag: v2.0.0-rc.1. This was a release-candidate, not a GA.
    - Commits since v2.0.0-rc.1 (2 total):
        a0a0a0a fix: correct type annotation on Consumer.ack() (no behavior change)
        b1b1b1b docs: polish migration guide from 1.x to 2.0
    - No new features since the rc; no new breaking changes since the rc.
    - The 2.0.0 line itself is a major release relative to 1.x
      (breaking: removed deprecated v1 handlers, renamed config keys).
      That major decision was already made at v2.0.0-rc.1.
    - Team convention documented in .agentic/deploy.md: promote an -rc
      tag to GA when the candidate has been soaking and only doc/typing
      fixes have landed since. The GA version retains the same X.Y.Z as
      the final rc; it does NOT bump to the next major/minor.
    - All seven pre-flight gates PASS.
    - Deploy target is the production Kubernetes cluster; rollback is
      `kubectl rollout undo deploy/api` per the runbook.
expected_plan:
  version_decision:
    version: "2.0.0"
    type: "major"
  phase_sequence:
    expected_phases: [1, 2, 3, 4, 5, 6, 7, 8]
  gate_enforcement:
    expected_fail_gate: null
    expected_stop_after_gate: false
  changelog_tag:
    keywords: ["2.0.0", "rc.1", "GA", "migration"]
    tag: "v2.0.0"
  rollback:
    required: true
    vacuous_changelog_tag: false
  expected_status: "SUCCESS"
