id: sk-004
description: "Password reset handler hashes the reset token with SHA-1 and uses a bare magic number (32) for the token byte length. Skeptic should raise Critical on insecure hash for token storage and Minor on the unnamed magic number."
component: skeptic
protocol_sha: b09cc57da369184442b8c86bfc373dc7a07fa3c8
inputs:
  adversarial_brief: |
    The Worker added a password-reset flow. Probe for: insecure cryptographic
    primitives used for token storage or comparison (SHA-1 / MD5 / unsalted
    hashes), timing-attack vulnerabilities in token comparison, and any
    unnamed magic numbers that should be hoisted to named constants for
    security-relevant parameters (token length, TTL, rate-limit windows).
  worker_output_file: worker_output.md
  diff_file: diff.patch
expected_findings:
  critical:
    - category: "insecure hash"
      keywords: ["sha-1"]
  major: []
  minor:
    - category: "magic number"
      keywords: ["32"]
expected_signoff_granted: false
