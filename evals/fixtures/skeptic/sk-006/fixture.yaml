id: sk-006
description: "Worker renames a config key in the loader but does not update the YAML file that supplies it. Skeptic should raise Critical for cross-file inconsistency causing startup failure."
component: skeptic
protocol_sha: 86b4cd5db464a2edd2fc46171d00743ad72f42b7
inputs:
  adversarial_brief: |
    The Worker renamed a configuration key from the legacy name to a new one
    in the loader that reads it. Probe for: call sites that still pass or
    reference the old name, YAML/TOML/JSON config files shipped in the repo
    that still use the old name, environment-variable documentation drift,
    and any test fixtures or sample configs that encode the old key.
  worker_output_file: worker_output.md
  diff_file: diff.patch
expected_findings:
  critical:
    - category: "cross-file inconsistency"
      keywords: ["queue_name"]
  major: []
  minor: []
expected_signoff_granted: false
