id: sk-010
description: "Worker adds a new conditional branch (free-tier discount) to a pricing function. Existing tests still pass because they only exercise paid-tier paths; no test added for the new branch. Skeptic should raise Major for missing test coverage on new branch."
component: skeptic
protocol_sha: 86b4cd5db464a2edd2fc46171d00743ad72f42b7
inputs:
  adversarial_brief: |
    The Worker added a new pricing branch that only fires for a subset of
    users. Probe for: branches that are reachable in production but not
    exercised by any test in the diff or in the existing test file, edge
    cases on the new branch (zero, negative, overflow), and interactions
    between the new branch and existing discount stacking rules.
  worker_output_file: worker_output.md
  diff_file: diff.patch
expected_findings:
  critical: []
  major:
    - category: "missing test coverage"
      keywords: ["free", "test"]
  minor: []
expected_signoff_granted: false
