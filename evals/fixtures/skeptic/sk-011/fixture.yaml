id: sk-011
description: "Worker adds a per-item DB lookup inside a loop over all orders for a monthly statement, introducing an N+1 query pattern on a hot cron job. Skeptic should raise Major for performance regression."
component: skeptic
protocol_sha: 86b4cd5db464a2edd2fc46171d00743ad72f42b7
inputs:
  adversarial_brief: |
    The Worker added logic that enriches each row in a batch with additional
    data. Probe for: per-row database lookups inside a loop that iterates
    over a collection, synchronous I/O called inside hot paths, repeated
    network or cache calls that could be batched, and any query pattern
    that scales linearly with input size where a set-based query would
    produce the same result.
  worker_output_file: worker_output.md
  diff_file: diff.patch
expected_findings:
  critical: []
  major:
    - category: "n+1 query"
      keywords: ["loop"]
  minor: []
