id: sk-012
description: "Pagination helper uses offset+limit but computes has_next by fetching len(results) == limit, which wrongly claims no next page when the final page is exactly full. Tests happen to pass on sizes that are not multiples of page_size. Skeptic should raise Major for off-by-one invariant violation."
component: skeptic
protocol_sha: 86b4cd5db464a2edd2fc46171d00743ad72f42b7
inputs:
  adversarial_brief: |
    The Worker added a pagination helper that reports a `has_next` flag to
    the client. Probe for: boundary-case bugs around exact-fill pages
    (total == k * page_size), off-by-one on the last page, tests that
    only cover sizes guaranteed not to hit the boundary, and any place
    the flag's value diverges from the truth the client needs to decide
    whether to request another page.
  worker_output_file: worker_output.md
  diff_file: diff.patch
expected_findings:
  critical: []
  major:
    - category: "off-by-one"
      keywords: ["has_next"]
  minor: []
expected_signoff_granted: false
