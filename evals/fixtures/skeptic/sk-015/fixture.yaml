id: sk-015
description: "Subtle finding with false-positive trap: Worker adds a logger.info call that logs the raw request body including the full JWT bearer token; the surrounding cleanup churn (renames, comment rewrites, import reorders) creates plausible-looking but harmless noise. Skeptic should raise Major for PII/credential leakage in logs and should NOT over-flag the cosmetic churn."
component: skeptic
protocol_sha: 86b4cd5db464a2edd2fc46171d00743ad72f42b7
inputs:
  adversarial_brief: |+
    The Worker did a small cleanup pass on a request-logging middleware
    while adding one new log line. Probe for: credentials, tokens, session
    cookies, or personally-identifying data flowing into log destinations
    that are retained or forwarded to third parties; any divergence from
    the redaction policy the codebase already uses elsewhere; and only
    genuine correctness or security problems. Do not flag pure style
    changes (rename-only, comment rewrites, import re-ordering).
  worker_output_file: worker_output.md
  diff_file: diff.patch
expected_findings:
  critical:
    - category: "credential in logs"
      keywords: ["authorization"]
  major: []
  minor: []
expected_signoff_granted: false
