[tool.ruff]
# Targets: Python CLIs in bin/ and hook scripts in hooks/
# extend-exclude keeps lint scoped to authored code; generated/vendor dirs excluded.
extend-exclude = [
    "content",
    "docs",
    ".claude",
    ".codex",
    ".cursor",
    ".gemini",
    ".kimi",
    ".opencode",
    ".pi",
    ".omp",
    ".hermes",
    ".openclaw",
    "evals",
    # Test directories checked separately; format gate runs on bin/+hooks/ only.
    "bin/tests",
    "bin/lib",
    "hooks/tests",
    "scripts",
]
line-length = 120

[tool.ruff.lint]
# Conservative rule set: E (pycodestyle errors), F (Pyflakes), I (isort).
# E501 (line-too-long) disabled: existing code has many long lines; enforce
# incrementally via editor tooling rather than blocking commits today.
select = ["E", "F", "I"]
ignore = [
    "E501",  # line-too-long - existing code; enable once reformatted
]

[tool.mypy]
# Run per-file with --scripts-are-modules to avoid duplicate-module errors
# from extension-less Python CLIs all named __main__.
scripts_are_modules = true
ignore_missing_imports = true
# Rules disabled to pass on current codebase without source changes:
#   arg-type    - bin/agentic-cost L779: Any|None passed to str param
#   no-redef    - bin/agentic-memory L186/202/216: loop variable redefined across branches
#   assignment  - bin/agentic-memory L338: list type mismatch in conditional branch
# These are real issues; fix them in a follow-up source cleanup pass.
disable_error_code = ["arg-type", "no-redef", "assignment"]
exclude = [
    "bin/tests/",
    "bin/lib/",
    "hooks/tests/",
    "content/",
    "docs/",
    "scripts/",
    "evals/",
]
